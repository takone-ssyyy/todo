<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>TODO</title>
  <!-- Prevent theme flash: read localStorage before first paint -->
  <script>
    (function () {
      try {
        var saved = JSON.parse(localStorage.getItem('todo-app-v1') || '{}');
        var theme = saved.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>TODO</h1>
      <button id="theme-toggle" aria-label="テーマ切替" title="テーマ切替">
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <main>
      <form id="add-form" autocomplete="off">
        <input
          id="new-task"
          type="text"
          placeholder="タスクを追加..."
          aria-label="新しいタスク"
          maxlength="200"
        />
        <button type="submit" aria-label="追加">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </form>

      <section id="task-section" aria-label="タスク一覧">
        <ul id="task-list" role="list" aria-live="polite"></ul>

        <div id="app-footer">
          <span id="items-left" aria-live="polite"></span>
          <nav id="filters" aria-label="フィルター">
            <button class="filter-btn active" data-filter="all" aria-pressed="true">すべて</button>
            <button class="filter-btn" data-filter="active" aria-pressed="false">未完了</button>
            <button class="filter-btn" data-filter="completed" aria-pressed="false">完了済み</button>
          </nav>
          <button id="clear-completed">完了済みを削除</button>
        </div>
      </section>

      <p id="empty-state" aria-live="polite"></p>
    </main>
  </div>

  <div id="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
  <script src="app.js" type="module"></script>
</body>
</html>
